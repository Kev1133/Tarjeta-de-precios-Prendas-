<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cards Flex</title>
  <link rel="stylesheet" href="Style.css">
</head>
<body>

<div class="container">

  <div class="card green">
    <img src="Green.webp" alt="Watch">
    <h3>GARNIER</h3>
    <p>The Best Watch in the Market/p>
    <span class="price">$60</span>
    <div class="stars">★★★★★</div>
    <button>Add to cart</button>
  </div>


  <div class="card red">
    <img src="red.jpg" alt="Tshirt">
    <h3>GARNIER</h3>
    <p>The most Confy Shirt</p>
    <span class="price2">$60</span>
    <div class="stars">★★★★★</div>
    <button>Add to cart</button>
  </div>

  <div class="card orange">
    <img src="orange.jpg" alt="Tie">
    <h3>GARNIER</h3>
    <p>Elegant Tie</p>
    <span class="price3">$15</span>
    <div class="stars">★★★★★</div>
    <button>Add to cart</button>
  </div>

</div>

</body>
</html>
